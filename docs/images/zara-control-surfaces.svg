<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Control Surfaces Visualization</title>
  <desc id="desc">Top-view illustration of rudder, elevator, and aileron controls used by Zara flight controller.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f7ff"/>
      <stop offset="100%" stop-color="#d5e9ff"/>
    </linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f4c81"/>
    </marker>
  </defs>

  <rect width="1280" height="620" fill="url(#bg2)"/>

  <text x="640" y="56" text-anchor="middle" fill="#0f2f4f" font-family="Verdana, sans-serif" font-size="34" font-weight="700">
    Flight Control Surfaces (Top View)
  </text>

  <g>
    <ellipse cx="640" cy="340" rx="75" ry="185" fill="#8db9e8" stroke="#0f4c81" stroke-width="4"/>
    <rect x="430" y="305" width="420" height="70" rx="12" fill="#8db9e8" stroke="#0f4c81" stroke-width="4"/>
    <rect x="455" y="292" width="65" height="96" rx="8" fill="#b9d6f5" stroke="#0f4c81" stroke-width="3"/>
    <rect x="760" y="292" width="65" height="96" rx="8" fill="#b9d6f5" stroke="#0f4c81" stroke-width="3"/>
  <polygon points="620,525 660,525 640,585" fill="#8db9e8" stroke="#0f4c81" stroke-width="4"/>
    <rect x="615" y="545" width="50" height="20" rx="4" fill="#b9d6f5" stroke="#0f4c81" stroke-width="3"/>
  </g>

  <line x1="520" y1="340" x2="360" y2="340" stroke="#0f4c81" stroke-width="4" marker-end="url(#arr)"/>
  <line x1="760" y1="340" x2="920" y2="340" stroke="#0f4c81" stroke-width="4" marker-end="url(#arr)"/>
  <text x="305" y="330" fill="#0f2f4f" font-family="Verdana, sans-serif" font-size="20" font-weight="700">Aileron Left</text>
  <text x="305" y="355" fill="#245b8a" font-family="Verdana, sans-serif" font-size="15">GPIO21 command: left roll</text>
  <text x="940" y="330" fill="#0f2f4f" font-family="Verdana, sans-serif" font-size="20" font-weight="700">Aileron Right</text>
  <text x="940" y="355" fill="#245b8a" font-family="Verdana, sans-serif" font-size="15">GPIO21 command: right roll</text>

  <line x1="640" y1="165" x2="640" y2="80" stroke="#0f4c81" stroke-width="4" marker-end="url(#arr)"/>
  <text x="530" y="88" fill="#0f2f4f" font-family="Verdana, sans-serif" font-size="20" font-weight="700">Elevator Up</text>
  <text x="530" y="111" fill="#245b8a" font-family="Verdana, sans-serif" font-size="15">GPIO19: pitch up / move up</text>

  <line x1="640" y1="520" x2="640" y2="470" stroke="#0f4c81" stroke-width="4" marker-end="url(#arr)"/>
  <text x="690" y="566" fill="#0f2f4f" font-family="Verdana, sans-serif" font-size="20" font-weight="700">Rudder</text>
  <text x="690" y="590" fill="#245b8a" font-family="Verdana, sans-serif" font-size="15">GPIO18: turn right / turn left</text>

  <text x="640" y="604" text-anchor="middle" fill="#245b8a" font-family="Verdana, sans-serif" font-size="14">
    Note: Each surface movement is held for 800 ms, then returns to center.
  </text>
</svg>
